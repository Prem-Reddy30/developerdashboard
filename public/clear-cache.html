<!DOCTYPE html>
<html>
<head>
    <title>Clear Cache - DeveloperDashboard</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 { margin: 0 0 1rem 0; font-size: 2rem; }
        p { margin: 0 0 2rem 0; opacity: 0.9; }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        .success {
            display: none;
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid #10b981;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Clear Cache</h1>
        <p>Click the button below to clear cached repository data<br>and fetch fresh analysis results.</p>
        <button onclick="clearCache()">Clear Cache Now</button>
        <div class="success" id="success">
            ✅ Cache cleared successfully!<br>
            <a href="/" style="color: white; margin-top: 1rem; display: inline-block;">← Back to Dashboard</a>
        </div>
    </div>

    <script>
        function clearCache() {
            localStorage.removeItem('codedashboard_repo_cache');
            document.getElementById('success').style.display = 'block';
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        }
    </script>
</body>
</html>
